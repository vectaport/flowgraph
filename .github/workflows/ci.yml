name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.20"
          cache: true

      # examples/ holds standalone HDL demo snippets -- one `main` per file,
      # meant to be run individually (`go run examples/<name>.go`) -- so it
      # does not compile as a single package and is excluded here.
      - name: Build
        run: go build . ./duckpond

      # Caught unreachable code in flowgraph_test.go before this workflow
      # even existed -- kept here to keep catching its class of bug.
      - name: Vet
        run: go vet . ./duckpond

      - name: Test
        run: go test -v .

      # Non-blocking, two known race families -- kept report-only so new
      # regressions are visible without gating merges on these:
      #  1. flowgraph.go ~621: waitStruct init on a loop back-edge writes
      #     usnode.Dsts[i].RdyCnt from the downstream node's goroutine, with
      #     no sync against the upstream node's own goroutine.
      #  2. fgbase.runAll (node.go ~792): when RunTime > 0 it sleeps for the
      #     deadline and returns WITHOUT wg.Wait()-ing the per-node
      #     goroutines it spawned (the wg.Wait() call only runs in the
      #     RunTime == 0 branch). So RunGraph()/fg.Run() can return to the
      #     caller while a node goroutine is still alive -- e.g. still
      #     reading the package-global TraceLevel/RunTime/TracePorts that
      #     the next sequential test then writes. Fix belongs in fgbase:
      #     always wg.Wait() after the deadline sleep, not just when there
      #     is no deadline.
      - name: Test (race detector, informational)
        timeout-minutes: 8
        continue-on-error: true
        run: go test -race -v .
